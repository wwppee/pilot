name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Typecheck + Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Node 24 added 2026-07 — Actions platform default is moving there.
        # Keep 20/22/24 to catch both ends of the support window.
        os: [macos-latest, ubuntu-latest]
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # ─── Root: Pilot CLI ────────────────────────────

      - name: Install root
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # ─── Web: Pilot Web UI ──────────────────────────

      - name: Install web
        working-directory: web
        run: npm ci

      - name: Web typecheck
        working-directory: web
        run: npm run typecheck

      - name: Web test
        working-directory: web
        run: npm test

      - name: Web build
        working-directory: web
        run: npm run build