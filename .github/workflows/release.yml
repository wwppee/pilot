name: Release
on:
  push:
    branches: [main]

# release-please-action needs both write scopes to create the release PR
# and (after merge) the GitHub release itself. The repository-level
# "Workflow permissions" setting in GitHub must also be set to
# "Read and write permissions" — see docs/releasing.md.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Pin to a specific SHA + use config file for explicit package
      # declaration. After v0.4.0 we kept hitting 0-job failures when
      # the action auto-detected; explicit config + token makes the
      # PR / release path deterministic.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          release-type: node

      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install & Build
        if: steps.release.outputs.release_created
        run: |
          npm ci
          npm run build

      # npm publish is OPTIONAL — only runs if NPM_TOKEN is set in
      # repo secrets. Without it, the release still completes
      # successfully (the GitHub release is the source of truth),
      # and you can publish from your machine later:
      #   npm publish --access public
      - name: Publish to npm
        if: steps.release.outputs.release_created && secrets.NPM_TOKEN != ''
        continue-on-error: true
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
