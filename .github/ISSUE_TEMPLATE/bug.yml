name: Bug Report
description: Report a bug in Pilot
title: "[Bug] "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      block: |
        Thanks for filing a bug! Please fill out the information below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: |
        When I run `pilot pack search foo`, it...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce.
      placeholder: |
        1. Run `pilot ...`
        2. See error
    validations:
      required: true

  - type: input
    id: pilot-version
    attributes:
      label: Pilot version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: pi-version
    attributes:
      label: pi version
      placeholder: "0.80.2"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: "v26.3.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste output, attach screenshots.
    validations:
      required: false